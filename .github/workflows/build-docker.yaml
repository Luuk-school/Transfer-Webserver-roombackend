name: Transfer-Room-backend-Docker-Build
on:
  push:
    branches: [ main ]

jobs:
  publish_image:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build image
        run: docker build ./ -t luuk-school/room-backend:latest
      - name: push image
        run: |
          docker login -u ridderleeuw -p ${{ secrets.DOCKER_HUB_TOKEN }}
          docker push luuk-school/room-backend:latest