apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: room-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Luuk-school/Transfer-Webserver-roombackend.git
    targetRevision: HEAD
    path: helm
    helm: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: room-backend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      
    syncOptions:
    - CreateNamespace=true
